<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Mun Craft</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #fff;
      }
      #unity-container {
        position: absolute;
        inset: 0;
      }
      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #000;
      }
      #unity-loading-bar {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: none;
      }
      #unity-progress-bar-empty {
        width: 240px;
        height: 16px;
        background: #222;
        border: 1px solid #555;
      }
      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: #fff;
      }
      #unity-warning {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
      }
      #start-overlay {
        position: absolute;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        z-index: 10;
      }
      #start-overlay h1 {
        margin: 0;
        font-size: 64px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      #start-overlay p {
        margin: 16px 0 0;
        font-size: 18px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>
    <div id="start-overlay">
      <h1>Mun Craft</h1>
      <p>Click to start</p>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var startOverlay = document.querySelector("#start-overlay");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px; color: white;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px; color: black;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/docs.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/docs.data.unityweb",
        frameworkUrl: buildUrl + "/docs.framework.js.unityweb",
        codeUrl: buildUrl + "/docs.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Mun Craft",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      function startGame() {
        startOverlay.removeEventListener('click', startGame);
        startOverlay.parentNode.removeChild(startOverlay);

        document.querySelector("#unity-loading-bar").style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            document.querySelector("#unity-loading-bar").style.display = "none";
          }).catch((message) => {
            alert(message);
          });
        };
        document.body.appendChild(script);
      }

      startOverlay.addEventListener('click', startGame);
    </script>
  </body>
</html>
